services:
  - type: web
    name: beep-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build --workspace=packages/shared && npm run build --workspace=apps/api
    startCommand: node apps/api/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: beep-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: 10000

databases:
  - name: beep-db
    plan: free
    region: frankfurt
    databaseName: beep_vqrw
    user: beep
