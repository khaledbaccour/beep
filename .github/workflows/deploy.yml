name: Deploy to VPS

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            BRANCH="${{ github.ref_name }}"
            PROJECT="beep-${BRANCH}"
            cd /opt/beep/$BRANCH
            git pull origin $BRANCH
            docker compose -p "$PROJECT" build web api
            docker compose -p "$PROJECT" up -d --force-recreate web api
